<script>
  let obj = {}; //객체정의

  //num속성을 추가하고 숫자10을 할당
  obj.num = 10;
  console.log(obj.num);
  //age 속성을 추가하고 숫자 30을 할당
  obj.age = 30;
  console.log(obj.age);
  //name속성을 추가하고 '이름'할당
  obj['name'] = 'yumi';
  console.log(obj.name);

  //현재 이름을 'sujin'으로 변경
  obj['name'] = 'sujin';

  obj.age = 40;
</script>
