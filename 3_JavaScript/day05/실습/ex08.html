<script>
  //1. arr변수에 빈배열을 선언하시오
  let arr = [];

  //2. arr 배열에 10을 대입하세요
  arr.push(0);
  arr[0] = 10;
  arr[1] = 20;
  arr[2] = 30;
  arr.push(40);
  arr.push(50);
  arr.push(60);

  // 3. arr배열의 값을 확인하세요
  console.log(arr);
  console.log(arr[0]);
  console.log(arr.slice(2));
  console.log(arr);
  arr.splice(0, 1, 100);
  console.log(arr);
  /**
   *   push() : 배열에 데이터 추가(맨끝에 인덱스부터 추가됨 )
   *   slice() : 배열의 특정 인덱스에 있는 값을 반환 (배열의 내용이 변경되지 않음)
   *   splice()
   *
   * **/
</script>
