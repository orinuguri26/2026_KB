<script>
  // forEach 반복문은 배열에 사용하기에 좋은 반복문이다.
  let arr = [10, 20, 30, 40, 50];

  arr.forEach(function (value, index) {
    console.log('array index :' + index + ' value :' + value);
  });

  // for in  (배열과 객체 모두 사용할 수 있는 반복문)

  let arr1 = [100, 200, 300, 400];
  let obj = {
    num: 10,
    str: 'hello',
    arr: [],
  };

  //배열의 인덱스를 1개씩 접근하여 순차적으로 순회하는경우
  for (let key in arr1) {
    console.log(arr1[key]);
  }

  //객체의 키를 1개씩 접근하여 순차적으로 순회하는 경우
  for (let key in obj) {
    console.log(obj[key]);
  }

  // for of 반복문 : ES6 추가된 구문

  for (let prop of arr1) {
    console.log(prop, obj[prop]);
  }

  let map = new Map([
    ['k1', 'v1'],
    ['k2', 'v2'],
  ]);

  for (let key of map.keys()) {
    console.log('key :' + key);
  }
  for (let value of map.values()) {
    console.log('value :' + value);
  }

  //for of 배열을 순회하는 경우  : 값을 가져온다.

  for (let num of arr1) {
    console.log(num);
  }

  // index를 가져온다.
  for (let num in arr1) {
    console.log(num);
  }
</script>
