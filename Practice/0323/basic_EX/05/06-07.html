<style>
  .buttonColor {
    background-color: aqua;
    color: black;
  }
  .buttonLayout {
    text-align: center;
    width: 120px;
  }
  .staticBorder {
    border: 1px dashed khaki;
  }
</style>

<div id="app">
  <input type="checkbox" v-model="isMyLayout" />레이아웃 적용여부<br />
  <button class="staticBorder" :class="[myColor, isMyLayout ? myLayout : '']">
    버튼
  </button>
</div>
<script src="https://unpkg.com/vue"></script>
<script>
  let vm = Vue.createApp({
    name: 'App',
    data() {
      return {
        myColor: 'buttonColor',
        myLayout: 'buttonLayout',
        isMyLayout: false,
      };
    },
  }).mount('#app');
</script>
