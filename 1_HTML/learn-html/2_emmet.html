<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<!-- 자식노드 > -->
		<div>
			<ul>
				<li></li>
			</ul>
		</div>

		<!-- 형제노드 + -->
		<div>
			<div></div>
			<ul></ul>
			<div></div>
		</div>

		<div>
			<p></p>
			<span></span>
		</div>

		<!-- 반복하기 * -->
		<div>
			<ul>
				<li></li>
				<li></li>
				<li></li>
				<li></li>
				<li></li>
			</ul>
		</div>

		<!-- 올라가기 ^ -->
		<div>
			<ul>
				<li></li>
			</ul>
			<p></p>
			<a href=""></a>
		</div>

		<!-- 그룹화 () -->

		<div>
			<header>
				<ul>
					<li></li>
					<li></li>
				</ul>
			</header>
			<footer></footer>
		</div>

		<!-- 아이디 # -->
		<span id="item1"></span>
		<div id="item2"></div>

		<div id="item3"></div>
		<div id="item4"></div>

		<!-- 클래스 . -->
		<span class="title"></span>
		<div class="title"></div>
		<div class="container"></div>

		<!-- 콘텐츠 {} -->
		<p class="container">Hello World~!</p>
		<p class="container1">Hello World!</p>
		<p class="container2">Hello World!!</p>
		<!-- 자동 넘버링 $ -->
		<p class="container">item1</p>
		<p class="container">item2</p>
		<p class="container">item3</p>
		<p class="container">item4</p>
		<p class="container">item5</p>
		<!-- 자동 넘버링 item$@*연결해서 시작할번호 * 개수 -->
		<ul>
			<li class="item1"></li>
			<li class="item2"></li>
			<li class="item3"></li>
		</ul>
		<ul>
			<li class="item4"></li>
			<li class="item5"></li>
			<li class="item6"></li>
			<li class="item7"></li>
			<li class="item8"></li>
		</ul>
		<ul>
			<li class="item3"></li>
			<li class="item4"></li>
			<li class="item5"></li>
			<li class="item6"></li>
			<li class="item7"></li>
		</ul>
	</body>
</html>
