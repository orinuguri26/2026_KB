<style>
  .btnColor {
    background-color: aqua;
    color: black;
  }
  .btnAlign {
    text-align: center;
    width: 120px;
  }
  .btnBorder {
    border: 1px dashed khaki;
  }
</style>
<div id="app">
  <input type="checkbox" v-model="btnColor" />색상<br />
  <input type="checkbox" v-model="btnAlign" />정렬, 크기<br />
  <input type="checkbox" v-model="btnBorder" />테두리<br />
  <button
    type="button"
    :class="{btnColor: btnColor, btnAlign: btnAlign, btnBorder: btnBorder}"
  >
    버튼
  </button>
</div>
<script src="https://unpkg.com/vue"></script>
<script>
  let vm = Vue.createApp({
    name: 'App',
    data() {
      return {
        btnColor: false,
        btnAlign: false,
        btnBorder: false,
      };
    },
  }).mount('#app');
</script>
